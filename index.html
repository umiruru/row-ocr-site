<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>10マスOCR（1マス1値）</title>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <style>
    :root {
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --sub: #6b7280;
      --line: #d1d5db;
      --accent: #111827;
      --accent-2: #2563eb;
      --ok: #166534;
      --warn: #92400e;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans JP", sans-serif;
    }
    .wrap {
      max-width: 880px;
      margin: 0 auto;
      padding: 16px 14px 40px;
    }
    .card {
      background: var(--card);
      border-radius: 22px;
      padding: 16px;
      box-shadow: 0 6px 24px rgba(17, 24, 39, 0.06);
      margin-bottom: 16px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 28px;
      line-height: 1.2;
    }
    p {
      margin: 8px 0;
      line-height: 1.65;
    }
    .note {
      color: var(--sub);
      font-size: 14px;
    }
    .pill {
      display: inline-block;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 8px 12px;
      font-weight: 700;
      margin-top: 8px;
      background: #f9fafb;
    }
    .buttons {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin: 14px 0 10px;
    }
    button, .file-btn {
      appearance: none;
      border: 0;
      border-radius: 16px;
      padding: 14px 16px;
      background: #e5e7eb;
      color: var(--text);
      font-size: 17px;
      font-weight: 700;
      text-align: center;
    }
    button.primary { background: var(--accent); color: white; }
    button.secondary { background: #eef2ff; color: #1e3a8a; }
    button:disabled { opacity: 0.5; }
    .stage {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      background: #111827;
      border-radius: 20px;
      overflow: hidden;
      margin-top: 10px;
    }
    video, canvas.preview {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      background: #111827;
    }
    .guide {
      position: absolute;
      left: 6%;
      right: 6%;
      top: 27%;
      bottom: 27%;
      border: 4px solid rgba(255, 255, 255, 0.95);
      border-radius: 18px;
      box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.22);
      pointer-events: none;
    }
    .guide::before {
      content: "この枠に1行分をまっすぐ合わせる";
      position: absolute;
      left: 0;
      top: -34px;
      color: white;
      font-size: 15px;
      font-weight: 700;
      text-shadow: 0 2px 8px rgba(0,0,0,.45);
    }
    .status {
      margin-top: 10px;
      font-weight: 700;
      min-height: 28px;
    }
    .status.ok { color: var(--ok); }
    .status.warn { color: var(--warn); }
    .results {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }
    @media (min-width: 680px) {
      .results { grid-template-columns: repeat(5, minmax(0, 1fr)); }
      .buttons { grid-template-columns: repeat(4, minmax(0, 1fr)); }
    }
    .cell {
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 12px;
      background: #fafafa;
    }
    .label {
      color: var(--sub);
      font-size: 14px;
      margin-bottom: 8px;
      font-weight: 700;
    }
    .input {
      width: 100%;
      border: 2px solid #d1d5db;
      border-radius: 16px;
      padding: 14px 12px;
      font-size: 18px;
      font-weight: 700;
      text-align: center;
      background: white;
    }
    .raw {
      margin-top: 8px;
      color: var(--sub);
      font-size: 12px;
      min-height: 18px;
      word-break: break-all;
    }
    .sumbox {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 16px;
      border: 4px solid #374151;
      border-radius: 24px;
      padding: 18px 20px;
      margin-top: 16px;
      background: white;
    }
    .sumtitle { color: var(--sub); font-size: 16px; font-weight: 700; }
    .sumvalue { font-size: 56px; line-height: 1; font-weight: 800; }
    .thumbs {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-top: 14px;
    }
    .thumb {
      border: 1px solid var(--line);
      border-radius: 14px;
      overflow: hidden;
      background: white;
    }
    .thumb img { display: block; width: 100%; height: auto; }
    .thumb .cap { padding: 8px 10px; font-size: 12px; color: var(--sub); }
    .hidden { display: none !important; }
    input[type="file"] { display: none; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>1〜10 OCRサイト</h1>
      <p>この版は <strong>1マスにそのまま 1.8 / 1.2 / 0.4 / 0</strong> と書く前提です。<br>10マスだけ読みます。OCR後は下で手直しできます。</p>
      <div class="pill">品目: <span id="itemName">未設定</span></div>
      <p class="note">コツ: 1行だけ・濃く大きく・できるだけまっすぐ・枠いっぱいに撮る</p>
      <div class="buttons">
        <button id="startBtn">カメラ開始</button>
        <button id="stopBtn">カメラ停止</button>
        <button id="snapBtn" class="primary">撮影</button>
        <label class="file-btn secondary" for="fileInput">画像を選択</label>
      </div>
      <div class="buttons">
        <button id="ocrBtn" class="primary">OCR実行</button>
        <button id="clearBtn">入力を全部クリア</button>
        <button id="sampleBtn">サンプル値を入れる</button>
        <button id="copyBtn">合計をコピー</button>
      </div>
      <input id="fileInput" type="file" accept="image/*">
      <div class="stage">
        <video id="video" playsinline muted autoplay></video>
        <canvas id="capturedCanvas" class="preview hidden"></canvas>
        <div class="guide"></div>
      </div>
      <div id="status" class="status">準備OK</div>
      <div class="thumbs hidden" id="thumbs"></div>
    </div>

    <div class="card">
      <h2>1〜10 の結果</h2>
      <p class="note">OCRミスがあればここで手直ししてください。合計は自動更新します。</p>
      <div class="results" id="results"></div>
      <div class="sumbox">
        <div>
          <div class="sumtitle">合計</div>
          <div class="note">空欄は無視します</div>
        </div>
        <div class="sumvalue" id="sumValue">0.0</div>
      </div>
    </div>
  </div>

  <script>
    const COLS = 10;
    const video = document.getElementById('video');
    const capturedCanvas = document.getElementById('capturedCanvas');
    const fileInput = document.getElementById('fileInput');
    const statusEl = document.getElementById('status');
    const resultsEl = document.getElementById('results');
    const thumbsEl = document.getElementById('thumbs');
    const sumValueEl = document.getElementById('sumValue');
    const itemNameEl = document.getElementById('itemName');

    let stream = null;
    let latestImageBitmap = null;
    let latestFullImageCanvas = null;
    let worker = null;
    let values = Array(COLS).fill('');
    let raws = Array(COLS).fill('');

    function getNameFromUrl() {
      const params = new URLSearchParams(location.search);
      return params.get('name') || '未設定';
    }
    itemNameEl.textContent = getNameFromUrl();

    function setStatus(text, type = '') {
      statusEl.textContent = text;
      statusEl.className = `status ${type}`.trim();
    }

    function buildInputs() {
      resultsEl.innerHTML = '';
      for (let i = 0; i < COLS; i++) {
        const card = document.createElement('div');
        card.className = 'cell';
        card.innerHTML = `
          <div class="label">${i + 1}</div>
          <input class="input" inputmode="decimal" placeholder="例 1.2">
          <div class="raw"></div>
        `;
        const input = card.querySelector('.input');
        const raw = card.querySelector('.raw');
        input.value = values[i];
        raw.textContent = raws[i] ? `OCR: ${raws[i]}` : '';
        input.addEventListener('input', () => {
          values[i] = normalizeManualInput(input.value);
          input.value = values[i];
          saveLocal();
          updateSum();
        });
        resultsEl.appendChild(card);
      }
    }

    function updateInputs() {
      [...resultsEl.children].forEach((card, i) => {
        card.querySelector('.input').value = values[i];
        card.querySelector('.raw').textContent = raws[i] ? `OCR: ${raws[i]}` : '';
      });
      updateSum();
      saveLocal();
    }

    function normalizeManualInput(value) {
      let s = String(value || '').trim();
      s = s.replace(/，/g, '.').replace(/,/g, '.').replace(/\s+/g, '');
      s = s.replace(/[^0-9.]/g, '');
      const firstDot = s.indexOf('.');
      if (firstDot !== -1) {
        s = s.slice(0, firstDot + 1) + s.slice(firstDot + 1).replace(/\./g, '');
      }
      if (s.startsWith('.')) s = '0' + s;
      if (s === '') return '';
      const n = Number(s);
      if (!Number.isFinite(n)) return '';
      return n.toFixed(1).replace(/\.0$/, '.0');
    }

    function updateSum() {
      const total = values.reduce((acc, v) => acc + (parseFloat(v) || 0), 0);
      sumValueEl.textContent = total.toFixed(1);
    }

    function saveLocal() {
      localStorage.setItem('row_ocr_onecell_values', JSON.stringify(values));
      localStorage.setItem('row_ocr_onecell_raws', JSON.stringify(raws));
    }

    function loadLocal() {
      try {
        const v = JSON.parse(localStorage.getItem('row_ocr_onecell_values') || '[]');
        const r = JSON.parse(localStorage.getItem('row_ocr_onecell_raws') || '[]');
        if (Array.isArray(v) && v.length === COLS) values = v;
        if (Array.isArray(r) && r.length === COLS) raws = r;
      } catch {}
    }

    async function ensureWorker() {
      if (!worker) {
        setStatus('OCR準備中…');
        worker = await Tesseract.createWorker('eng', 1, {
          logger: (m) => {
            if (m.status === 'recognizing text') {
              setStatus(`OCR中… ${Math.round((m.progress || 0) * 100)}%`);
            }
          }
        });
        await worker.setParameters({
          tessedit_pageseg_mode: Tesseract.PSM.SINGLE_WORD,
          tessedit_char_whitelist: '0123456789.',
          preserve_interword_spaces: '0'
        });
      }
      return worker;
    }

    async function startCamera() {
      try {
        stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: { ideal: 'environment' } },
          audio: false
        });
        video.srcObject = stream;
        await video.play();
        video.classList.remove('hidden');
        capturedCanvas.classList.add('hidden');
        setStatus('カメラ開始。枠に1行を合わせて撮影してください。', 'ok');
      } catch (e) {
        setStatus('カメラを開始できませんでした。SafariでHTTPSのURLを開いてください。', 'warn');
      }
    }

    function stopCamera() {
      if (stream) {
        stream.getTracks().forEach(t => t.stop());
        stream = null;
      }
      setStatus('カメラ停止');
    }

    function captureCurrentFrame() {
      const vw = video.videoWidth;
      const vh = video.videoHeight;
      if (!vw || !vh) {
        setStatus('先にカメラ開始を押してください。', 'warn');
        return;
      }
      latestFullImageCanvas = document.createElement('canvas');
      latestFullImageCanvas.width = vw;
      latestFullImageCanvas.height = vh;
      latestFullImageCanvas.getContext('2d').drawImage(video, 0, 0, vw, vh);
      showPreview(latestFullImageCanvas);
      setStatus('撮影しました。OCR実行を押してください。', 'ok');
    }

    async function loadImageFile(file) {
      const img = new Image();
      img.onload = () => {
        latestFullImageCanvas = document.createElement('canvas');
        latestFullImageCanvas.width = img.naturalWidth;
        latestFullImageCanvas.height = img.naturalHeight;
        latestFullImageCanvas.getContext('2d').drawImage(img, 0, 0);
        showPreview(latestFullImageCanvas);
        setStatus('画像を読み込みました。OCR実行を押してください。', 'ok');
      };
      img.src = URL.createObjectURL(file);
    }

    function showPreview(sourceCanvas) {
      const out = capturedCanvas;
      out.width = sourceCanvas.width;
      out.height = sourceCanvas.height;
      out.getContext('2d').drawImage(sourceCanvas, 0, 0);
      video.classList.add('hidden');
      capturedCanvas.classList.remove('hidden');
    }

    function getGuideCropFromCanvas(canvas) {
      // Match the visual guide percentages.
      const x = Math.round(canvas.width * 0.06);
      const y = Math.round(canvas.height * 0.27);
      const w = Math.round(canvas.width * 0.88);
      const h = Math.round(canvas.height * 0.46);
      return { x, y, w, h };
    }

    function cropCanvas(source, rect) {
      const c = document.createElement('canvas');
      c.width = rect.w;
      c.height = rect.h;
      c.getContext('2d').drawImage(source, rect.x, rect.y, rect.w, rect.h, 0, 0, rect.w, rect.h);
      return c;
    }

    function preprocessCell(sourceCanvas) {
      const out = document.createElement('canvas');
      out.width = 480;
      out.height = 300;
      const ctx = out.getContext('2d');

      // White background.
      ctx.fillStyle = '#fff';
      ctx.fillRect(0, 0, out.width, out.height);

      // Draw central portion to avoid borders grabbing too much attention.
      const sx = sourceCanvas.width * 0.08;
      const sy = sourceCanvas.height * 0.16;
      const sw = sourceCanvas.width * 0.84;
      const sh = sourceCanvas.height * 0.68;
      ctx.drawImage(sourceCanvas, sx, sy, sw, sh, 36, 24, out.width - 72, out.height - 48);

      const img = ctx.getImageData(0, 0, out.width, out.height);
      const d = img.data;
      // grayscale + adaptive-ish threshold
      let sum = 0;
      for (let i = 0; i < d.length; i += 4) {
        const g = d[i] * 0.299 + d[i + 1] * 0.587 + d[i + 2] * 0.114;
        d[i] = d[i + 1] = d[i + 2] = g;
        sum += g;
      }
      const avg = sum / (d.length / 4);
      const threshold = Math.max(140, avg - 22);
      for (let i = 0; i < d.length; i += 4) {
        const v = d[i] < threshold ? 0 : 255;
        d[i] = d[i + 1] = d[i + 2] = v;
      }
      ctx.putImageData(img, 0, 0);
      return out;
    }

    function splitInto10Cells(rowCanvas) {
      const cells = [];
      const cw = rowCanvas.width / COLS;
      for (let i = 0; i < COLS; i++) {
        const x = Math.round(i * cw);
        const w = Math.round((i + 1) * cw) - x;
        // Focus on writing row rather than header area.
        const y = Math.round(rowCanvas.height * 0.08);
        const h = Math.round(rowCanvas.height * 0.72);
        const cell = cropCanvas(rowCanvas, { x, y, w, h });
        cells.push(cell);
      }
      return cells;
    }

    function normalizeOcr(raw) {
      let s = String(raw || '').trim();
      s = s.replace(/\s+/g, '');
      s = s.replace(/[Oo○◯]/g, '0');
      s = s.replace(/[Il｜l]/g, '1');
      s = s.replace(/[,，]/g, '.');
      s = s.replace(/[^0-9.]/g, '');
      if (!s) return '';

      // If multiple dots, keep the first.
      const firstDot = s.indexOf('.');
      if (firstDot !== -1) {
        s = s.slice(0, firstDot + 1) + s.slice(firstDot + 1).replace(/\./g, '');
      }

      if (s.startsWith('.')) s = '0' + s;
      if (s.endsWith('.')) s = s + '0';

      // Heuristics for common OCR misses when the dot disappears.
      if (!s.includes('.')) {
        if (s.length >= 2) {
          s = s.slice(0, -1) + '.' + s.slice(-1);
        } else if (s.length === 1) {
          s = s + '.0';
        }
      }

      const n = Number(s);
      if (!Number.isFinite(n)) return '';
      return n.toFixed(1).replace(/\.0$/, '.0');
    }

    async function runOcr() {
      if (!latestFullImageCanvas) {
        setStatus('先に撮影か画像選択をしてください。', 'warn');
        return;
      }
      thumbsEl.innerHTML = '';
      thumbsEl.classList.remove('hidden');
      const w = await ensureWorker();
      try {
        const guide = getGuideCropFromCanvas(latestFullImageCanvas);
        const row = cropCanvas(latestFullImageCanvas, guide);
        const cells = splitInto10Cells(row);
        raws = Array(COLS).fill('');
        values = Array(COLS).fill('');

        for (let i = 0; i < cells.length; i++) {
          const pre = preprocessCell(cells[i]);
          const thumb = document.createElement('div');
          thumb.className = 'thumb';
          thumb.innerHTML = `<img alt="cell ${i+1}"><div class="cap">${i + 1}</div>`;
          thumb.querySelector('img').src = pre.toDataURL('image/png');
          thumbsEl.appendChild(thumb);

          const { data: { text } } = await w.recognize(pre);
          raws[i] = (text || '').trim();
          values[i] = normalizeOcr(text);
          updateInputs();
        }
        setStatus('OCRが終わりました。下の値を確認してください。', 'ok');
      } catch (e) {
        console.error(e);
        setStatus('OCRに失敗しました。もう少し近く・まっすぐ撮ってください。', 'warn');
      }
    }

    document.getElementById('startBtn').addEventListener('click', startCamera);
    document.getElementById('stopBtn').addEventListener('click', stopCamera);
    document.getElementById('snapBtn').addEventListener('click', captureCurrentFrame);
    document.getElementById('ocrBtn').addEventListener('click', runOcr);
    document.getElementById('clearBtn').addEventListener('click', () => {
      values = Array(COLS).fill('');
      raws = Array(COLS).fill('');
      updateInputs();
      thumbsEl.innerHTML = '';
      thumbsEl.classList.add('hidden');
      setStatus('クリアしました。');
    });
    document.getElementById('sampleBtn').addEventListener('click', () => {
      values = ['1.8','1.2','1.4','1.2','1.8','1.9','1.2','0.4','0.0','1.3'];
      raws = ['18','12','14','12','18','19','12','04','00','13'];
      updateInputs();
      setStatus('サンプル値を入れました。', 'ok');
    });
    document.getElementById('copyBtn').addEventListener('click', async () => {
      const text = sumValueEl.textContent;
      try {
        await navigator.clipboard.writeText(text);
        setStatus(`合計 ${text} をコピーしました。`, 'ok');
      } catch {
        setStatus('コピーできませんでした。', 'warn');
      }
    });
    fileInput.addEventListener('change', (e) => {
      const file = e.target.files?.[0];
      if (file) loadImageFile(file);
    });

    loadLocal();
    buildInputs();
    updateSum();
  </script>
</body>
</html>
